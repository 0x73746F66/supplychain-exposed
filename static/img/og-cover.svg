<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#faf7f0"/>
  <rect x="28" y="28" width="1144" height="574" fill="none" stroke="#8c2f23" stroke-width="2"/>
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#8c2f23" stroke-width="1" opacity="0.5"/>

  <text x="600" y="128" text-anchor="middle" fill="#8c2f23"
        font-family="Georgia, 'Times New Roman', serif" font-size="26"
        letter-spacing="9" font-weight="bold">SCAN BEFORE YOU PUBLISH</text>

  <text x="600" y="258" text-anchor="middle" fill="#201c17"
        font-family="Georgia, 'Times New Roman', serif" font-weight="bold"
        font-size="118" letter-spacing="-2">The Vulnerability</text>
  <text x="600" y="372" text-anchor="middle" fill="#201c17"
        font-family="Georgia, 'Times New Roman', serif" font-weight="bold"
        font-size="118" letter-spacing="-2">Manifesto</text>

  <text x="600" y="446" text-anchor="middle" fill="#5c5347"
        font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="29">We defend software in the wrong place, too late,</text>
  <text x="600" y="486" text-anchor="middle" fill="#5c5347"
        font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="29">with data we can't trust. The fix is at the source.</text>

  <text x="600" y="536" text-anchor="middle" fill="#8c2f23"
        font-family="Georgia, serif" font-size="28">&#10087;</text>

  <text x="600" y="574" text-anchor="middle" fill="#8a7f6e"
        font-family="Georgia, 'Times New Roman', serif" font-size="22"
        letter-spacing="8">CHRISTOPHER  LANGTON</text>
