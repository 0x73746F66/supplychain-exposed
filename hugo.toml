baseURL = "https://supplychain.exposed/"
title = "Supply Chain Exposed"
defaultContentLanguage = "en"
enableRobotsTXT = true
enableGitInfo = false

[languages]
  [languages.en]
    locale = "en-US"
    weight = 1

# This is a single long-form book: no tags, categories, or RSS-per-term noise.
disableKinds = ["taxonomy", "term"]

[params]
  author = "Christopher Langton"
  subtitle = "We defend software in the wrong place, too late, with data we can't trust. The fix is at the source."
  description = "A manifesto for stopping malware at the door: registries must scan before they publish, package managers are the source of truth, and vulnerability data must be free, enriched, and good. Detection was the control all along."
  # Used for Open Graph / Twitter card images and the colophon link.
  ogImage = "img/og-cover.png"
  repo = "https://github.com/0x73746F66/supplychain-exposed"
  vulnetix = "https://vulnetix.com"

[markup]
  [markup.goldmark.renderer]
    # Needed for the ornamental dividers, pull-quotes and small-caps spans
    # used to give chapters a printed-book feel.
    unsafe = true
  [markup.goldmark.extensions.typographer]
    # Real curly quotes and ellipses for a typeset feel.
    disable = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false

[minify]
  disableSVG = false
  [minify.tdewolff.html]
    keepWhitespace = false
