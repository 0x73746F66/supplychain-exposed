<footer class="colophon">
  <div class="colophon__rule" aria-hidden="true">❧</div>
  <p class="colophon__line">
    <em>The Vulnerability Manifesto</em> &middot; written by
    {{ .Site.Params.author }}.
  </p>
  <p class="colophon__line colophon__meta">
    The prose is released under
    <a href="https://creativecommons.org/licenses/by/4.0/">CC&nbsp;BY&nbsp;4.0</a>.
    Quote it, translate it, send it to a registry.
  </p>
  <p class="colophon__line colophon__links">
    <a href="{{ .Site.Params.repo }}">Source on GitHub</a>
    <span aria-hidden="true">·</span>
    <a href="{{ .Site.Params.vulnetix }}">Vulnetix</a>
    <span aria-hidden="true">·</span>
    <a href="{{ site.Home.RelPermalink }}">Back to the cover</a>
  </p>
  {{ if not .IsHome }}<p class="colophon__line colophon__detection">Detection was the control all along.</p>{{ end }}
</footer>
